name: deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            echo "Starting Deployment"

            # Go to home directory
            cd /home/ubuntu

            # Clone repo if not exists
            if [ ! -d "medicalbot" ]; then
              git clone https://github.com/YOUR_USERNAME/YOUR_REPO.git medicalbot
            fi

            # Go into repo
            cd medicalbot

            # Pull latest code
            git pull origin main

            # Stop old container
            docker stop medicalbot-container || true

            # Remove old container
            docker rm medicalbot-container || true

            # Remove old image
            docker rmi medicalbot:latest || true

            # Build image
            docker build -t medicalbot .

            # Run container
            docker run -d \
              --name medicalbot-container \
              -p 8080:8080 \
              medicalbot

            echo "Deployment Successful"
