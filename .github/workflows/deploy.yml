name: Deploy Medical Chatbot to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master

      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}

        script: |

          echo "Starting Deployment..."

          cd /home/ubuntu/Build-a-Complete-Medical-Chatbot-with-LLMs-LangChain-Pinecone-Flask-AWS

          # Fix Git Dubious Ownership
          git config --global --add safe.directory /home/ubuntu/Build-a-Complete-Medical-Chatbot-with-LLMs-LangChain-Pinecone-Flask-AWS

          # Pull Latest Code
          git pull origin main

          # Stop Existing Container
          sudo docker stop medicalbot-container || true

          # Remove Existing Container
          sudo docker rm medicalbot-container || true

          # Remove Old Image
          sudo docker rmi medicalbot || true

          # Build New Docker Image
          sudo docker build -t medicalbot .

          # Run New Container
          sudo docker run -d \
            --name medicalbot-container \
            -p 8080:8080 \
            --env-file .env \
            medicalbot

          echo "Deployment Successful 🚀"
