<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Chatbot</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

    <div class="container">
        <div class="card">

            <!-- HEADER -->
            <div class="card-header">

                <div class="d-flex align-items-center">

                    <div class="img_cont">
                        <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png"
                            class="user_img">

                        <span class="online_icon"></span>
                    </div>

                    <div class="user_info">
                        <span>Medical AI Assistant</span>
                        <p>Ask medical questions anytime</p>
                    </div>

                </div>

            </div>

            <!-- CHAT BODY -->
            <div id="messageFormeight" class="card-body msg_card_body">

                <!-- Initial Bot Message -->
                <div class="d-flex justify-content-start mb-4">

                    <div class="img_cont_msg">
                        <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png"
                            class="user_img_msg">
                    </div>

                    <div class="msg_cotainer">
                        Hello 👋 I am your Medical AI Assistant. Ask me anything.
                    </div>

                </div>

            </div>

            <!-- FOOTER -->
            <div class="card-footer">

                <form id="messageArea" class="input-group">

                    <input type="text"
                        id="text"
                        name="msg"
                        placeholder="Type your medical question..."
                        autocomplete="off"
                        class="form-control type_msg"
                        required />

                    <div class="input-group-append">

                        <button type="submit"
                            id="send"
                            class="send_btn">

                            <i class="fas fa-paper-plane"></i>

                        </button>

                    </div>

                </form>

            </div>

        </div>
    </div>

    <script>

        $(document).ready(function () {

            $("#messageArea").on("submit", function (event) {

                event.preventDefault();

                const date = new Date();
                const hour = date.getHours();
                const minute = date.getMinutes();

                const str_time = hour + ":" + minute;

                var rawText = $("#text").val();

                // USER MESSAGE
                var userHtml = `
                <div class="d-flex justify-content-end mb-4">

                    <div class="msg_cotainer_send">
                        ${rawText}
                        <span class="msg_time_send">${str_time}</span>
                    </div>

                    <div class="img_cont_msg">
                        <img src="https://i.ibb.co/d5b84Xw/Untitled-design.png"
                            class="user_img_msg">
                    </div>

                </div>
                `;

                $("#text").val("");
                $("#messageFormeight").append(userHtml);

                // AUTO SCROLL
                $("#messageFormeight").scrollTop(
                    $("#messageFormeight")[0].scrollHeight
                );

                // BOT TYPING
                var typingHtml = `
                <div id="typing" class="d-flex justify-content-start mb-4">

                    <div class="img_cont_msg">
                        <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png"
                            class="user_img_msg">
                    </div>

                    <div class="msg_cotainer">
                        Typing...
                    </div>

                </div>
                `;

                $("#messageFormeight").append(typingHtml);

                $.ajax({

                    data: {
                        msg: rawText,
                    },

                    type: "POST",

                    url: "/get",

                }).done(function (data) {

                    $("#typing").remove();

                    var botHtml = `
                    <div class="d-flex justify-content-start mb-4">

                        <div class="img_cont_msg">
                            <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png"
                                class="user_img_msg">
                        </div>

                        <div class="msg_cotainer">
                            ${data}
                            <span class="msg_time">${str_time}</span>
                        </div>

                    </div>
                    `;

                    $("#messageFormeight").append(botHtml);

                    // AUTO SCROLL
                    $("#messageFormeight").scrollTop(
                        $("#messageFormeight")[0].scrollHeight
                    );

                });

            });

        });

    </script>

</body>

</html>
